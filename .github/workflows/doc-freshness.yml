name: Doc Freshness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed paths vs base
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$PR_BASE_REF"
            CHANGED=$(git diff --name-only "origin/${PR_BASE_REF}...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect doc-touching code changes
        id: detect
        env:
          CHANGED: ${{ steps.diff.outputs.changed }}
        run: |
          set -euo pipefail
          missing=()

          touched_src=$(printf '%s\n' "$CHANGED" | grep -E '^src/' || true)
          touched_judgment=$(printf '%s\n' "$CHANGED" | grep -E '^src/judgment/' || true)
          touched_providers=$(printf '%s\n' "$CHANGED" | grep -E '^src/providers/' || true)
          touched_migrations=$(printf '%s\n' "$CHANGED" | grep -E '^migrations/' || true)

          touched_any_thin_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/(RUNTIME|CODE_MAP|ARCHITECTURE|DATA_MODEL|OPERATIONS|TESTING)\.md$' || true)
          touched_data_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/DATA_MODEL\.md$' || true)
          touched_roadmap_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/04_IMPLEMENTATION_PLAN\.md$' || true)
          touched_current_state=$(printf '%s\n' "$CHANGED" | grep -E '^docs/context/current-state\.md$' || true)
          touched_acceptance_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/06_ACCEPTANCE_TESTS\.md$' || true)
          touched_runbook=$(printf '%s\n' "$CHANGED" | grep -E '^docs/05_RUNBOOK\.md$' || true)
          touched_testing_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/TESTING\.md$' || true)
          touched_operations_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/OPERATIONS\.md$' || true)
          touched_ci_cd_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/11_CI_CD\.md$' || true)
          touched_generated=$(printf '%s\n' "$CHANGED" | grep -E '^docs/generated/' || true)
          touched_adr=$(printf '%s\n' "$CHANGED" | grep -E '^docs/adr/' || true)
          touched_workflows=$(printf '%s\n' "$CHANGED" | grep -E '^\.github/workflows/.*\.ya?ml(\.example)?$' || true)

          if [ -n "$touched_src" ] &&
             [ -z "$touched_any_thin_doc" ] &&
             [ -z "$touched_roadmap_doc" ] &&
             [ -z "$touched_current_state" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_adr" ]; then
            missing+=("src/ changed → update the matching docs: thin current-state docs (\`docs/RUNTIME.md\`, \`CODE_MAP.md\`, \`DATA_MODEL.md\`, \`OPERATIONS.md\`, or \`TESTING.md\`) for implemented behavior, \`docs/04_IMPLEMENTATION_PLAN.md\` for slice/evidence changes, \`docs/context/current-state.md\` for active position changes, \`docs/06_ACCEPTANCE_TESTS.md\` for gate changes, or add an ADR.")
          fi

          if { [ -n "$touched_judgment" ] || [ -n "$touched_providers" ]; } &&
             [ -z "$touched_any_thin_doc" ] &&
             [ -z "$touched_roadmap_doc" ] &&
             [ -z "$touched_current_state" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_adr" ]; then
            missing+=("judgment/ or providers/ changed → if a thin doc carries a \`Last verified against code\` header for this area, update the SHA and date.")
          fi

          if [ -n "$touched_migrations" ] && [ -z "$touched_data_doc" ] && [ -z "$touched_generated" ] && [ -z "$touched_adr" ]; then
            missing+=("migrations/ changed → update \`docs/DATA_MODEL.md\` and run \`bun run docs:generate:schema\` then commit \`docs/generated/schema.md\`.")
          fi

          if [ -n "$touched_workflows" ] &&
             [ -z "$touched_testing_doc" ] &&
             [ -z "$touched_operations_doc" ] &&
             [ -z "$touched_runbook" ] &&
             [ -z "$touched_ci_cd_doc" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_adr" ]; then
            missing+=("workflow files changed → update \`docs/11_CI_CD.md\`, \`docs/TESTING.md\`, \`docs/OPERATIONS.md\`, \`docs/05_RUNBOOK.md\`, \`docs/06_ACCEPTANCE_TESTS.md\`, or add an ADR if CI/CD behavior, required checks, release gates, or deployment behavior changed.")
          fi

          if [ ${#missing[@]} -eq 0 ]; then
            echo "missing=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "missing<<EOF"
              for m in "${missing[@]}"; do
                echo "- $m"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR if docs may be stale
        if: >
          steps.detect.outputs.missing != '' &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MISSING: ${{ steps.detect.outputs.missing }}
        with:
          script: |
            const missing = process.env.MISSING || '';
            const marker = '<!-- doc-freshness-check -->';
            const body = [
              marker,
              '### Doc freshness check',
              '',
              'Changes were detected that may require roadmap/status, gate, thin-doc, generated-doc, CI/CD-doc, or ADR updates.',
              '',
              missing,
              '',
              'Policy: `docs/DOCUMENTATION.md`. This comment is automated — if the change is intentional, check "No doc impact" in the PR template and add a brief reason.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write summary for direct push
        if: >
          steps.detect.outputs.missing != '' &&
          github.event_name == 'push'
        env:
          MISSING: ${{ steps.detect.outputs.missing }}
        run: |
          {
            echo "### Doc freshness check"
            echo ""
            echo "Changes were detected that may require roadmap/status, gate, thin-doc, generated-doc, CI/CD-doc, or ADR updates."
            echo ""
            printf '%s\n' "$MISSING"
            echo ""
            echo "Policy: \`docs/DOCUMENTATION.md\`. This is a soft warning — the push succeeded."
            echo ""
            echo "_Note: direct main-push is a temporary policy. See \`docs/policies/TEMP_MAIN_PUSH.md\`._"
          } >> "$GITHUB_STEP_SUMMARY"
